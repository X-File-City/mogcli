# Adapted from opensrc/repos/github.com/steipete/gogcli/.github/workflows/release.yml.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-wam:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: git checkout "$env:RELEASE_TAG"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build mog-wam.exe
        run: |
          uv tool install pyinstaller
          pyinstaller --onefile --name mog-wam scripts/wam/wam_auth.py

      - name: Upload WAM artifact
        uses: actions/upload-artifact@v4
        with:
          name: mog-wam
          path: dist/mog-wam.exe
          retention-days: 1

  goreleaser:
    needs: build-wam
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: git checkout "$RELEASE_TAG"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download WAM artifact
        uses: actions/download-artifact@v4
        with:
          name: mog-wam
          path: dist/wam

      - name: Verify WAM artifact
        run: |
          if [[ ! -f dist/wam/mog-wam.exe ]]; then
            echo "missing dist/wam/mog-wam.exe" >&2
            exit 1
          fi
          ls -lh dist/wam/mog-wam.exe

      - name: Stash GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Validate Homebrew tap token
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]]; then
            echo "Missing required secret: HOMEBREW_TAP_GITHUB_TOKEN" >&2
            echo "Set it in repository settings: Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --config /tmp/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

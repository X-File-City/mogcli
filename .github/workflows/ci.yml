# Adapted from opensrc/repos/github.com/steipete/gogcli/.github/workflows/ci.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run CI checks
        run: make ci
      - name: Build
        run: go build -mod=vendor ./cmd/mog

  darwin-cgo-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test -mod=vendor ./...
      - name: Build (Keychain / cgo)
        run: CGO_ENABLED=1 go build -mod=vendor ./cmd/mog

# Adapted from opensrc/repos/github.com/steipete/gogcli/.github/workflows/ci.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run CI checks
        run: make ci
      - name: Build
        run: go build -mod=vendor ./cmd/mog

  darwin-cgo-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test -mod=vendor ./...
      - name: Build (Keychain / cgo)
        run: CGO_ENABLED=1 go build -mod=vendor ./cmd/mog

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test -mod=vendor ./...
      - name: Build
        run: go build -mod=vendor ./cmd/mog
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Build mog-wam.exe
        run: |
          uv tool run --python 3.12 --with "msal[broker]>=1.20,<2" pyinstaller --onefile --name mog-wam scripts/wam/wam_auth.py

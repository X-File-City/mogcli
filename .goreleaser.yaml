# Adapted from opensrc/repos/github.com/steipete/gogcli/.goreleaser.yaml.
version: 2

project_name: mogcli

changelog:
  disable: true

builds:
  - id: mog
    main: ./cmd/mog
    binary: mog
    ldflags: >-
      -s -w
      -X github.com/jaredpalmer/mogcli/internal/cmd.version={{ .Tag }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=vendor
    targets:
      - linux_amd64
      - linux_arm64
  - id: mog_windows
    main: ./cmd/mog
    binary: mog
    ldflags: >-
      -s -w
      -X github.com/jaredpalmer/mogcli/internal/cmd.version={{ .Tag }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=vendor
    targets:
      - windows_amd64
      - windows_arm64
  - id: mog_darwin
    main: ./cmd/mog
    binary: mog
    ldflags: >-
      -s -w
      -X github.com/jaredpalmer/mogcli/internal/cmd.version={{ .Tag }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=1
      - GOFLAGS=-mod=vendor
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds:
      - mog
      - mog_darwin
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: windows
    builds:
      - mog_windows
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      # mog-wam.exe must be pre-built by CI before goreleaser runs.
      # Build with: uv tool install pyinstaller && pyinstaller --onefile --name mog-wam scripts/wam/wam_auth.py
      - src: dist/wam/mog-wam.exe
        strip_parent: true

checksum:
  name_template: checksums.txt

brews:
  - name: mogcli
    directory: Formula
    homepage: "https://github.com/jaredpalmer/mogcli"
    description: "Microsoft 365 in your terminal"
    license: "MIT"
    install: |
      bin.install "mog"
    test: |
      system "#{bin}/mog", "--help"
    repository:
      owner: jaredpalmer
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com

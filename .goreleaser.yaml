# Adapted from opensrc/repos/github.com/steipete/gogcli/.goreleaser.yaml.
version: 2

project_name: mogcli

changelog:
  disable: true

builds:
  - id: mog
    main: ./cmd/mog
    binary: mog
    ldflags: >-
      -s -w
      -X github.com/jaredpalmer/mogcli/internal/cmd.version={{ .Tag }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=vendor
    targets:
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: mog_darwin
    main: ./cmd/mog
    binary: mog
    ldflags: >-
      -s -w
      -X github.com/jaredpalmer/mogcli/internal/cmd.version={{ .Tag }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/jaredpalmer/mogcli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=1
      - GOFLAGS=-mod=vendor
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - builds:
      - mog
      - mog_darwin
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
